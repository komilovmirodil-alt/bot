services:
  - type: worker
    name: aninexus-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_python.py
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CHECK_SUB
        value: "true"
      - key: DB_STORAGE
        value: /var/data/database.sqlite
    disk:
      name: aninexus-data
      mountPath: /var/data
      sizeGB: 1
