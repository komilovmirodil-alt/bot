services:
  - type: worker
    name: aninexus-bot
    env: python
    plan: starter
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install --only-binary=:all: -r requirements.txt
    startCommand: python bot_python.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_ONLY_BINARY
        value: ":all:"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CHECK_SUB
        value: "true"
      - key: DB_STORAGE
        value: /var/data/database.sqlite
    disk:
      name: aninexus-data
      mountPath: /var/data
      sizeGB: 1
